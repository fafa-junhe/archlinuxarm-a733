# =============================================================================
# Build workflow for Arch Linux ARM packages — Radxa Cubie A7A (Allwinner A733)
#
# Architecture constraints (IMPORTANT):
#   linux-a733            PKGBUILD arch=(aarch64)
#                         → cross-compiled from x86_64 using aarch64-linux-gnu-
#                         → makepkg --ignorearch required
#
#   uboot-radxa-cubie-a7a PKGBUILD arch=(any)
#                         → Allwinner packaging tools are x86_64-only binaries;
#                           building on ARM64 WILL fail
#                         → MUST run on x86_64
#
# Both jobs run on ubuntu-latest (x86_64) + archlinux:latest container.
#
# Extra toolchains:
#   Kernel  : aarch64-linux-gnu-gcc  (Arch official extra repo)
#   U-Boot  : arm-linux-gnueabihf-*  (downloaded from developer.arm.com)
#             riscv-none-elf-*       (downloaded from xpack releases)
# =============================================================================

name: Build Packages

on:
  push:
    branches: [main, master]
    paths:
      - "linux-radxa-cubie-a7a-pkg/**"
      - "uboot-radxa-cubie-a7a-pkg/**"
      - "system-config-radxa-cubie-a7a-pkg/**"
      - ".github/workflows/build.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "linux-radxa-cubie-a7a-pkg/**"
      - "uboot-radxa-cubie-a7a-pkg/**"
      - "system-config-radxa-cubie-a7a-pkg/**"
      - ".github/workflows/build.yml"
  release:
    types: [published]
  workflow_dispatch:

env:
  # xpack RISC-V GCC used by U-Boot PKGBUILD (hardcoded path: /opt/xpack/riscv-none-elf-gcc/)
  # Check latest: https://github.com/xpack-dev-tools/riscv-none-elf-gcc-xpack/releases
  XPACK_RISCV_GCC_VERSION: "14.2.0-2"
  # ARM GNU Toolchain for U-Boot (arm-linux-gnueabihf- cross-compiler)
  # Check latest: https://developer.arm.com/downloads/-/arm-gnu-toolchain-downloads
  ARM_GNU_TC_VERSION: "13.3.rel1"

jobs:
  # ============================================================================
  # Job 1 — Linux Kernel (cross-compiled for aarch64 on x86_64)
  #
  #   PKGBUILD arch=(aarch64), but we cross-compile with --ignorearch.
  #   CROSS_COMPILE=aarch64-linux-gnu- is injected into makepkg environment.
  #   Runner  : ubuntu-latest  (x86_64, GitHub-hosted)
  #   Container: archlinux:latest  (x86_64 only image — sufficient for cross)
  # ============================================================================
  build-kernel:
    name: "Linux Kernel [aarch64 cross-compile]"
    runs-on: ubuntu-latest

    container:
      image: archlinux:latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Disable signature checking for CI reliability ─────────────────────
      # The Docker image itself is the trust anchor; SigLevel=Never is safe here.
      - name: Configure pacman for CI
        run: |
          sed -i 's/SigLevel    = Required DatabaseOptional/SigLevel = Never/' /etc/pacman.conf
          sed -i 's/SigLevel = Required DatabaseOptional/SigLevel = Never/' /etc/pacman.conf

      # ── System update + makedepends + aarch64 cross-compiler ──────────────
      - name: Upgrade system and install build dependencies
        run: |
          pacman -Syu --noconfirm --needed
          pacman -S --noconfirm --needed \
            base-devel sudo git \
            aarch64-linux-gnu-gcc \
            aarch64-linux-gnu-glibc \
            bc cpio dtc kmod python \
            qemu-user-static binfmt-support
        
        # Ensure binfmt is registered for aarch64
      - name: Register binfmt for aarch64
        run: |
          update-binfmts --enable qemu-aarch64 2>/dev/null || true
          ls /proc/sys/fs/binfmt/

      # ── makepkg refuses to run as root; create an unprivileged user ───────
      - name: Create non-root build user
        run: |
          useradd -m builder
          echo 'builder ALL=(ALL) NOPASSWD: ALL' >> /etc/sudoers
          chown -R builder:builder "$GITHUB_WORKSPACE"

      # ── Cross-compile linux-a733 for aarch64 ─────────────────────────────
      #   --ignorearch  : override arch=(aarch64) check on x86_64 host
      #   ARCH          : tells the kernel build system the target architecture
      #   CROSS_COMPILE : selects the aarch64 cross-toolchain prefix
      #   CARCH         : overrides host arch so pkg filename is aarch64
      #   qemu-user-static + QEMU_LD_PREFIX enables running aarch64 binaries on x86_64
      - name: Build linux-a733 packages (cross-compile)
        working-directory: linux-radxa-cubie-a7a-pkg
        run: |
          sed -i 's/^CARCH=.*/CARCH=aarch64/' /etc/makepkg.conf
          
          su builder -c '
            env \
              ARCH=arm64 \
              CROSS_COMPILE=aarch64-linux-gnu- \
              QEMU_LD_PREFIX=/usr/aarch64-linux-gnu \
              DTC_FLAGS="-@" \
              makepkg -s --noconfirm --noprogressbar --ignorearch
          '

      # ── Collect *.pkg.tar.zst artifacts ───────────────────────────────────
      - name: Upload kernel package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-kernel-packages
          path: linux-radxa-cubie-a7a-pkg/*.pkg.tar.zst
          retention-days: 30
          if-no-files-found: error

  # ============================================================================
  # Job 2 — U-Boot Bootloader
  #
  #   Allwinner packaging tools are x86_64-only ELF binaries.
  #   Runner  : ubuntu-latest  (x86_64)
  #   Container: archlinux:latest
  #
  #   ARM cross-compiler (arm-linux-gnueabihf-):
  #     NOT in Arch official repos (AUR only) → downloaded from developer.arm.com.
  #     ARM GNU Toolchain uses the "arm-none-linux-gnueabihf-" prefix internally;
  #     symlinks to "arm-linux-gnueabihf-" are created so the PKGBUILD's
  #     CROSS_COMPILE=arm-linux-gnueabihf- resolves correctly.
  #
  #   RISC-V cross-compiler (riscv-none-elf-):
  #     PKGBUILD hardcodes /opt/xpack/riscv-none-elf-gcc/bin/riscv-none-elf-
  #     → downloaded from xpack releases and extracted to that exact path.
  # ============================================================================
  build-uboot:
    name: "U-Boot [x86_64]"
    runs-on: ubuntu-latest

    container:
      image: archlinux:latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Disable signature checking for CI reliability ─────────────────────
      - name: Configure pacman for CI
        run: |
          sed -i 's/SigLevel    = Required DatabaseOptional/SigLevel = Never/' /etc/pacman.conf
          sed -i 's/SigLevel = Required DatabaseOptional/SigLevel = Never/' /etc/pacman.conf

      # ── System update + makedepends available in official repos ───────────
      #   arm-linux-gnueabihf-gcc is AUR-only; handled separately below.
      - name: Upgrade system and install build dependencies
        run: |
          pacman -Syu --noconfirm --needed
          pacman -S --noconfirm --needed \
            base-devel sudo git wget xz \
            bc dtc python swig util-linux dos2unix xxd gptfdisk

      # ── Download ARM GNU Toolchain from developer.arm.com ─────────────────
      #   Provides arm-none-linux-gnueabihf-* binaries.
      #   Symlinks create the arm-linux-gnueabihf-* names expected by PKGBUILD.
      - name: Install ARM GNU Toolchain (arm-linux-gnueabihf)
        run: |
          TC_VERSION="${ARM_GNU_TC_VERSION}"
          TARBALL="arm-gnu-toolchain-${TC_VERSION}-x86_64-arm-none-linux-gnueabihf.tar.xz"
          URL="https://developer.arm.com/-/media/Files/downloads/gnu/${TC_VERSION}/binrel/${TARBALL}"
          echo "Downloading ARM GNU Toolchain: ${URL}"
          wget -q "${URL}" -O /tmp/arm-tc.tar.xz
          mkdir -p /opt/arm-gnu-toolchain
          tar -xf /tmp/arm-tc.tar.xz \
            -C /opt/arm-gnu-toolchain \
            --strip-components=1
          echo "--- ARM GNU Toolchain installed ---"
          /opt/arm-gnu-toolchain/bin/arm-none-linux-gnueabihf-gcc --version
          # Create arm-linux-gnueabihf-* symlinks expected by PKGBUILD
          echo "--- Creating arm-linux-gnueabihf-* symlinks ---"
          for bin in /opt/arm-gnu-toolchain/bin/arm-none-linux-gnueabihf-*; do
            name="$(basename "${bin}")"
            link_name="${name/arm-none-linux-gnueabihf-/arm-linux-gnueabihf-}"
            ln -sf "${bin}" "/usr/local/bin/${link_name}"
            echo "  ${link_name} -> ${bin}"
          done
          arm-linux-gnueabihf-gcc --version

      # ── Install xpack RISC-V GCC to /opt/xpack/riscv-none-elf-gcc ─────────
      #   The PKGBUILD hardcodes:
      #     export RISCV_CROSS_COMPILE=/opt/xpack/riscv-none-elf-gcc/bin/riscv-none-elf-
      - name: Install xpack RISC-V GCC toolchain
        run: |
          XPACK_VERSION="${XPACK_RISCV_GCC_VERSION}"
          TARBALL="xpack-riscv-none-elf-gcc-${XPACK_VERSION}-linux-x64.tar.gz"
          URL="https://github.com/xpack-dev-tools/riscv-none-elf-gcc-xpack/releases/download/v${XPACK_VERSION}/${TARBALL}"
          echo "Downloading xpack RISC-V GCC: ${URL}"
          wget -q "${URL}" -O /tmp/riscv-gcc.tar.gz
          mkdir -p /opt/xpack/riscv-none-elf-gcc
          tar -xf /tmp/riscv-gcc.tar.gz \
            -C /opt/xpack/riscv-none-elf-gcc \
            --strip-components=1
          echo "--- xpack riscv-none-elf-gcc installed ---"
          /opt/xpack/riscv-none-elf-gcc/bin/riscv-none-elf-gcc --version

      # ── Belt-and-suspenders: assert we are on x86_64 ─────────────────────
      - name: Assert x86_64 runner
        run: |
          ARCH="$(uname -m)"
          echo "Runner architecture: ${ARCH}"
          if [ "${ARCH}" != "x86_64" ]; then
            echo "ERROR: U-Boot MUST be built on x86_64 (Allwinner tools are x86_64-only)."
            exit 1
          fi

      # ── makepkg refuses to run as root; create an unprivileged user ───────
      - name: Create non-root build user
        run: |
          useradd -m builder
          echo 'builder ALL=(ALL) NOPASSWD: ALL' >> /etc/sudoers
          chown -R builder:builder "$GITHUB_WORKSPACE"

      # ── Build the package ─────────────────────────────────────────────────
      #   The PKGBUILD itself exports CROSS_COMPILE and PATH for its toolchains.
      #   We pass PATH so the builder user can see /usr/local/bin symlinks.
      - name: Build uboot-radxa-cubie-a7a package
        working-directory: uboot-radxa-cubie-a7a-pkg
        run: |
          sudo -u builder -H \
            env PATH="/usr/local/bin:/opt/xpack/riscv-none-elf-gcc/bin:$PATH" \
            makepkg --nodeps --noconfirm --noprogressbar

      # ── Collect *.pkg.tar.zst artifacts ───────────────────────────────────
      - name: Upload U-Boot package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: uboot-packages
          path: uboot-radxa-cubie-a7a-pkg/*.pkg.tar.zst
          retention-days: 30
          if-no-files-found: error

  # ============================================================================
  # Job 3 — System Configuration Package
  #
  #   arch=(any), builds on x86_64 natively.
  #   Runner  : ubuntu-latest  (x86_64)
  #   Container: archlinux:latest
  # ============================================================================
  build-system-config:
    name: "System Config [x86_64]"
    runs-on: ubuntu-latest

    container:
      image: archlinux:latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure pacman for CI
        run: |
          sed -i 's/SigLevel    = Required DatabaseOptional/SigLevel = Never/' /etc/pacman.conf
          sed -i 's/SigLevel = Required DatabaseOptional/SigLevel = Never/' /etc/pacman.conf

      - name: Upgrade system and install build dependencies
        run: |
          pacman -Syu --noconfirm --needed
          pacman -S --noconfirm --needed base-devel sudo git

      - name: Create non-root build user
        run: |
          useradd -m builder
          echo 'builder ALL=(ALL) NOPASSWD: ALL' >> /etc/sudoers
          chown -R builder:builder "$GITHUB_WORKSPACE"

      - name: Build system-config package
        working-directory: system-config-radxa-cubie-a7a-pkg
        run: |
          sudo -u builder -H makepkg -s --noconfirm --noprogressbar

      - name: Upload system-config package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: system-config-packages
          path: system-config-radxa-cubie-a7a-pkg/*.pkg.tar.zst
          retention-days: 30
          if-no-files-found: error

  # ============================================================================
  # Job 4 — Attach packages to GitHub Release
  #
  #   Uploads all packages to GitHub Release.
  #   Creates release if it doesn't exist.
  # ============================================================================
  release:
    name: "Upload Release Assets"
    needs: [build-kernel, build-uboot, build-system-config]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download kernel packages
        uses: actions/download-artifact@v4
        with:
          name: linux-kernel-packages
          path: release-assets/

      - name: Download U-Boot packages
        uses: actions/download-artifact@v4
        with:
          name: uboot-packages
          path: release-assets/

      - name: Download system-config packages
        uses: actions/download-artifact@v4
        with:
          name: system-config-packages
          path: release-assets/

      - name: List release assets
        run: ls -lh release-assets/

      - name: Determine release tag
        id: release_info
        run: |
          if [ "${{ github.event_name }}" == "release" ]; then
            TAG_NAME="${{ github.event.release.tag_name }}"
          elif [ "${{ github.event_name }}" == "push" ]; then
            TAG_NAME="${GITHUB_REF#refs/tags/}"
            if [ "$TAG_NAME" == "$GITHUB_REF" ] || [ -z "$TAG_NAME" ]; then
              TAG_NAME="v$(date +%Y.%m.%d)-${GITHUB_SHA:0:8}"
            fi
          else
            TAG_NAME="v$(date +%Y.%m.%d)-${GITHUB_SHA:0:8}"
          fi
          echo "TAG_NAME=${TAG_NAME}" >> $GITHUB_OUTPUT
          echo "Release tag: ${TAG_NAME}"

      - name: Attach packages to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_info.outputs.TAG_NAME }}
          name: "Release ${{ steps.release_info.outputs.TAG_NAME }}"
          body: |
            Automated release with Arch Linux ARM packages for Radxa Cubie A7A.

            ## Packages
            - linux-a733: Linux kernel for A733
            - linux-a733-headers: Kernel headers
            - uboot-radxa-cubie-a7a: U-Boot bootloader
            - radxa-system-config-allwinner: System configuration

            ## Installation
            Download and install packages manually with:
            `pacman -U <package>.pkg.tar.zst`

          files: |
            release-assets/*.pkg.tar.zst
          fail_on_unmatched_files: false
